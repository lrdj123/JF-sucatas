<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JF Sucatas - Compramos Sucata | Melhor Preço da Região</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#f57c00;--orange-dark:#e65100;--dark:#1a1a1a;--darker:#0d0d0d;--white:#f5f5f5;--gold:#ffb300}
body{font-family:sans-serif;background:var(--darker);color:var(--white);line-height:1.6}

/* HERO */
.hero{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;background:#111}
.hero-logo{font-size:3rem;font-weight:900;color:var(--orange);margin-bottom:1rem}
.hero-sub{font-size:1.5rem;color:var(--gold);margin-bottom:1rem}
.hero-btn{display:inline-block;background:var(--orange);color:black;padding:1rem 2rem;border-radius:50px;font-weight:700;text-decoration:none;margin-top:1rem}

/* SECTIONS */
.section{padding:3rem 1rem;max-width:800px;margin:0 auto}
.section-title{text-align:center;font-size:2rem;color:var(--orange);margin-bottom:2rem}

/* CATEGORY */
.category{margin-bottom:2rem;background:#222;padding:1.5rem;border-radius:10px}
.category-name{font-size:1.5rem;font-weight:bold;margin-bottom:1rem;color:var(--orange)}
.materials-grid{display:grid;gap:10px}
.material-item{display:block;background:#333;padding:1rem;border-radius:5px;color:white;text-decoration:none;transition:0.3s}
.material-item:hover{background:var(--orange);color:black}

/* WHATSAPP FLOAT */
.whatsapp-float{position:fixed;bottom:20px;left:20px;background:#25d366;padding:15px;border-radius:50px;color:white;text-decoration:none;font-weight:bold}
</style>
</head>
<body>

    <p>Compramos cobre, alumínio, ferro, plástico e muito mais.</p>

            <a class="material-item" href="https://api.whatsapp.com/send?phone=5544997104322&text=Quero%20vender%20Cobre%20Mel">Cobre Mel</a>
